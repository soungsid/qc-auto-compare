services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: qc_auto
      POSTGRES_USER: ${DB_USER:-qc_auto_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supersecret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-qc_auto_user} -d qc_auto"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qc-auto-network

  # ---------------------------------------------------------------------------
  # FastAPI Backend (includes APScheduler)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-qc_auto_user}:${DB_PASSWORD:-supersecret}@postgres:5432/qc_auto
      BACKEND_INGEST_URL: http://backend:8000/api/ingest/batch
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - qc-auto-network

  # ---------------------------------------------------------------------------
  # Scrapy Crawler (run on-demand or scheduled externally)
  # ---------------------------------------------------------------------------
  crawler:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    restart: "no"
    environment:
      BACKEND_INGEST_URL: http://backend:8000/api/ingest/batch
      CRAWL_DELAY_MIN: "2"
      CRAWL_DELAY_MAX: "5"
      CRAWLER_BATCH_SIZE: "50"
    depends_on:
      - backend
    profiles:
      - crawl   # Only starts when: docker compose --profile crawl up crawler
    networks:
      - qc-auto-network

  # ---------------------------------------------------------------------------
  # React Frontend (nginx) — exposed via Traefik
  # nginx proxies /api/ to backend internally; Traefik handles TLS + routing
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - qc-auto-network
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_network"
      - "traefik.http.services.qc-auto-frontend.loadbalancer.server.port=3000"
      - "traefik.http.routers.qc-auto-frontend.rule=Host(`auto.canadaquebec.ca`)"
      - "traefik.http.routers.qc-auto-frontend.tls=true"
      - "traefik.http.routers.qc-auto-frontend.tls.certresolver=myhttpchallenge"
      - "traefik.http.routers.qc-auto-frontend.middlewares=qc-auto-https-headers"
      - "traefik.http.middlewares.qc-auto-https-headers.headers.customRequestHeaders.X-Forwarded-Proto=https"

volumes:
  pgdata:

networks:
  qc-auto-network:
    driver: bridge
  traefik_network:
    external: true
