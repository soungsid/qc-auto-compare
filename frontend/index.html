<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AutoQC — Comparez les véhicules neufs et d'occasion au Québec. Prix, concessionnaires, filtres avancés." />
    <meta name="theme-color" content="#0F0F0F" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet" />
    <title>AutoQC — Comparez les véhicules neufs et d'occasion au Québec</title>
    <script>
      // Apply saved theme before page renders to prevent flash
      (function() {
        const theme = localStorage.getItem('theme') || 'system';
        const isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) document.documentElement.classList.add('dark');
      })();
    </script>
    <style>
      body { font-family: 'DM Sans', system-ui, -apple-system, sans-serif; font-optical-sizing: auto; }
    </style>
  </head>
  <body class="bg-creme dark:bg-dark-primary text-charbon dark:text-creme-200 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
